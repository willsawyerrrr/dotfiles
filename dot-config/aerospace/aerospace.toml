esc = ["reload-config", "mode main", "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main"]
r = ["flatten-workspace-tree", "mode main", "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main"]
f = ["layout floating tiling", "mode main", "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main"]
backspace = ["close-all-windows-but-current", "mode main", "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main"]
alt-shift-h = ["join-with left", "mode main", "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main"]
alt-shift-j = ["join-with down", "mode main", "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main"]
