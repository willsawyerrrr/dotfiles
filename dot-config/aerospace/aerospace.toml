start-at-login = true
after-login-command = []
after-startup-command = ["exec-and-forget sketchybar"]
exec-on-workspace-change = ["/bin/bash", "-c", "sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE"]
accordion-padding = 30
default-root-container-layout = "tiles"
automatically-unhide-macos-hidden-apps = true

[key-mapping]
preset = "qwerty"

[gaps.inner]
horizontal = 10
vertical = 10

[gaps.outer]
left = 10
bottom = 10
top = [{monitor.built-in = 20}, 50]
right = 10

[mode.main.binding]
alt-enter = "exec-and-forget open -n /Applications/kitty.app"
alt-slash = "layout tiles horizontal vertical"
alt-comma = "layout accordion horizontal vertical"
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"
alt-shift-minus = "resize smart -50"
alt-shift-equal = "resize smart +50"
alt-shift-0 = "balance-sizes"
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"
alt-shift-1 = ["move-node-to-workspace 1", "exec-and-forget sketchybar --trigger aerospace_window_moved DESTINATION_WORKSPACE=1"]
alt-shift-2 = ["move-node-to-workspace 2", "exec-and-forget sketchybar --trigger aerospace_window_moved DESTINATION_WORKSPACE=2"]
