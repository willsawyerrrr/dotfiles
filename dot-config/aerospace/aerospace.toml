start-at-login = true

# https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []
after-startup-command = ["exec-and-forget sketchybar"]

# Notify Sketchybar about workspace change
exec-on-workspace-change = [
  "/bin/bash",
  "-c",
  "sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE",
]

# https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = "tiles"

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = "qwerty"

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.left = 10
outer.bottom = 10
outer.top = [{ monitor.built-in = 20 }, 50]
outer.right = 10

# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.main.binding]
# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right
# - Modifiers.      cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
alt-enter = "exec-and-forget open -n /Applications/kitty.app"

# See: https://nikitabobko.github.io/AeroSpace/commands#layout
alt-slash = "layout tiles horizontal vertical"
alt-comma = "layout accordion horizontal vertical"

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"

# See: https://nikitabobko.github.io/AeroSpace/commands#move
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-shift-minus = "resize smart -50"
alt-shift-equal = "resize smart +50"
alt-shift-0 = "balance-sizes"

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"

# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
alt-shift-1 = ["move-node-to-workspace 1", "exec-and-forget sketchybar --trigger aerospace_window_moved DESTINATION_WORKSPACE=1"]
alt-shift-2 = ["move-node-to-workspace 2", "exec-and-forget sketchybar --trigger aerospace_window_moved DESTINATION_WORKSPACE=2"]
alt-shift-3 = ["move-node-to-workspace 3", "exec-and-forget sketchybar --trigger aerospace_window_moved DESTINATION_WORKSPACE=3"]
alt-shift-4 = ["move-node-to-workspace 4", "exec-and-forget sketchybar --trigger aerospace_window_moved DESTINATION_WORKSPACE=4"]
alt-shift-5 = ["move-node-to-workspace 5", "exec-and-forget sketchybar --trigger aerospace_window_moved DESTINATION_WORKSPACE=5"]
alt-shift-6 = ["move-node-to-workspace 6", "exec-and-forget sketchybar --trigger aerospace_window_moved DESTINATION_WORKSPACE=6"]
alt-shift-7 = ["move-node-to-workspace 7", "exec-and-forget sketchybar --trigger aerospace_window_moved DESTINATION_WORKSPACE=7"]
alt-shift-8 = ["move-node-to-workspace 8", "exec-and-forget sketchybar --trigger aerospace_window_moved DESTINATION_WORKSPACE=8"]
alt-shift-9 = ["move-node-to-workspace 9", "exec-and-forget sketchybar --trigger aerospace_window_moved DESTINATION_WORKSPACE=9"]

# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
cmd-tab = "workspace-back-and-forth"

# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
alt-shift-tab = "move-workspace-to-monitor --wrap-around next"

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
alt-shift-semicolon = [
  "mode service",
  "exec-and-forget sketchybar --trigger aerospace_status_change MODE=service",
]

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
alt-enter = [ 
  "exec-and-forget sketchybar",
  "mode main",
  "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main",
]

esc = [
  "reload-config",
  "mode main",
  "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main",
]

r = [
  # Reset layout
  "flatten-workspace-tree",
  "mode main",
  "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main",
]
f = [
  # Toggle between floating and tiling layout
  "layout floating tiling",
  "mode main",
  "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main",
]

backspace = [
  "close-all-windows-but-current",
  "mode main",
  "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main",
]
alt-shift-h = [
  "join-with left",
  "mode main",
  "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main",
]
alt-shift-j = [
  "join-with down",
  "mode main",
  "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main",
]
alt-shift-k = [
  "join-with up",
  "mode main",
  "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main",
]
alt-shift-l = [
  "join-with right",
  "mode main",
  "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main",
]

down = "volume down"
up = "volume up"
shift-down = [
  "volume set 0",
  "mode main",
  "exec-and-forget sketchybar --trigger aerospace_status_change MODE=main",
]

[workspace-to-monitor-force-assignment]
1 = "main"
2 = "main"
3 = "main"
4 = "secondary"
5 = "secondary"
6 = "secondary"
7 = "main"
8 = "main"
9 = "main"

[[on-window-detected]]
if.app-id = "net.kovidgoyal.kitty"
run = "move-node-to-workspace 1"

[[on-window-detected]]
if.app-id = "com.microsoft.VSCode"
run = "move-node-to-workspace 1"

[[on-window-detected]] # Cursor
if.app-id = "com.todesktop.230313mzl4w4u92"
run = "move-node-to-workspace 1"

[[on-window-detected]]
if.app-id = "com.google.Chrome"
run = "move-node-to-workspace 2"

[[on-window-detected]]
if.app-id = "notion.id"
run = "move-node-to-workspace 2"

[[on-window-detected]]
if.app-id = "com.tinyspeck.slackmacgap"
run = "move-node-to-workspace 3"

[[on-window-detected]]
if.app-id = "com.linear"
run = "move-node-to-workspace 3"
