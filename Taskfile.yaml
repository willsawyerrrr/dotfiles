# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

tasks:
  aerospace:gen:
    cmd: python3 scripts/gen-aerospace-config.py
    desc: Regenerate aerospace.toml from aerospace.source.toml

  brew:lock:
    cmd: brew bundle dump --force --describe
    desc: Dump Brewfile

  brew:install:
    if: "! brew bundle check"
    cmd: brew bundle install
    desc: Install from Brewfile

  dracula:add:
    vars:
      REPO: "{{index .CLI_ARGS_LIST 0}}"
    cmd: git submodule add https://github.com/dracula/{{.REPO}}.git dracula/{{.REPO}}
    desc: Add git submodule for Dracula repo

  dracula:remove:
    vars:
      REPO: "{{index .CLI_ARGS_LIST 0}}"
    cmds:
      - git submodule deinit --force dracula/{{.REPO}}
      - git rm --force dracula/{{.REPO}}
      - rm -rf .git/modules/dracula/{{.REPO}}
    desc: Remove git submodule for Dracula repo

  hooks:install:
    cmd: git config core.hooksPath scripts/git-hooks
    desc: Point this repo's git hooks at scripts/git-hooks

  stow:preflight:
    desc: Pre-create target dirs that must stay unfolded (apps that write runtime state alongside config)
    vars:
      UNFOLD_DIRS:
        - ~/.config/claude
    cmds:
      - for: { var: UNFOLD_DIRS }
        cmd: mkdir -p {{.ITEM}} && touch {{.ITEM}}/.stow-keep
    silent: true

  stow:install:
    deps:
      - stow:preflight
      - aerospace:gen
    cmd: stow --dotfiles --restow .
    desc: Install dotfiles
